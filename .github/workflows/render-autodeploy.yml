name: Render Auto Deploy

on:
  push:
    branches:
      - main
      - master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js (frontend build)
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Install and build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Setup Python (backend lint/test optional)
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install backend dependencies
        run: |
          pip install -r requirements.txt

      - name: Deploy backend to Render (manual trigger via API)
        if: secrets.RENDER_BACKEND_SERVICE_ID && secrets.RENDER_API_KEY
        run: |
          echo "Triggering Render backend deploy..."
          curl -sS -X POST "https://api.render.com/v1/services/${{ secrets.RENDER_BACKEND_SERVICE_ID }}/deploys" \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Accept: application/json" \
            -H "Content-Type: application/json" \
            -d '{"clearCache": true}'

      - name: Deploy frontend to Render (manual trigger via API)
        if: secrets.RENDER_FRONTEND_SERVICE_ID && secrets.RENDER_API_KEY
        run: |
          echo "Triggering Render frontend deploy..."
          curl -sS -X POST "https://api.render.com/v1/services/${{ secrets.RENDER_FRONTEND_SERVICE_ID }}/deploys" \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Accept: application/json" \
            -H "Content-Type: application/json" \
            -d '{"clearCache": true}'
